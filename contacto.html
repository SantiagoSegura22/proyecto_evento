            <input type="text" id="nombre" minlength="10" name="nombre"  required

                    placeholder="escribe tu correo">

            <label for="mensaje">mensaje</label>
            <textarea name="mensaje" id="mensaje" requiered 
                     placeholder="escribe tu mensaje">

                    </textarea>
